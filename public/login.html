<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Admin Login</h2>

        <input type="password" id="pass" placeholder="รหัสผ่าน">

        <br>

        <button onclick="login()">เข้าสู่ระบบ</button>

    </div>

    <script>

        function login() {

            const password = document.getElementById("pass").value

            if (password === "photobooth123") {

                window.location.href = "/admin/dashboard.html"

            } else {

                alert("รหัสผ่านไม่ถูกต้อง")

            }

        }

    </script>

</body>

</html>
